version: '3.8'

services:
  php:
    image: php83-simpeg:1.0
    container_name: php83-simpeg
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./src/backend:/var/www/html
      - ./php.ini:/usr/local/etc/php/php.ini
    expose:
      - "9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "1000:1000"
    networks:
      - simpeg_net

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-simpeg
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - simpeg_net

networks:
  simpeg_net:
    driver: bridge
